# =============================================================================
# Nginx Configuration for Laravel
# =============================================================================
# This is a reverse-proxy config that:
#   1. Serves static assets (CSS, JS, images) directly from /var/www/public.
#   2. Forwards all PHP requests to the 'app' container on port 9000 (FastCGI).
#   3. Implements Laravel's routing convention (try_files → index.php).
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # ── Document root ───────────────────────────────────────────────────────
    # Laravel's entry point is public/index.php.
    root /var/www/public;
    index index.php index.html;

    # ── Character set ───────────────────────────────────────────────────────
    charset utf-8;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Main location block ─────────────────────────────────────────────────
    # try_files checks for a real file/directory first, then falls through
    # to index.php so Laravel's router can handle it.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP handling via FastCGI ────────────────────────────────────────────
    # All .php requests are proxied to the 'app' service (PHP-FPM) on port
    # 9000. Docker Compose DNS resolves 'app' to the container IP.
    location ~ \.php$ {
        fastcgi_pass  app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include       fastcgi_params;

        # FastCGI buffering — prevents Nginx from timing out on long requests.
        fastcgi_buffering        on;
        fastcgi_buffer_size      16k;
        fastcgi_buffers          4 16k;
        fastcgi_connect_timeout  60;
        fastcgi_send_timeout     180;
        fastcgi_read_timeout     180;
    }

    # ── Deny hidden files ───────────────────────────────────────────────────
    # Block access to .env, .git, .htaccess, etc.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Static asset caching ────────────────────────────────────────────────
    # Tell browsers to cache static files for 30 days.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
